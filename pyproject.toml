[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "flowing-os"
version = "0.1.1"   
description = "Interoperability and observability layer for multi-agent AI systems"
readme = "README.md"
authors = [
    { name = "Joaquín Gabriel Arias" }
]
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = []

[tool.setuptools]

package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
